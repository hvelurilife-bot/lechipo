name: Github Action Demo

on:
  push

jobs:

  sit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: SIT Deployment
        run: |
          echo "Deploying to SIT environment"
          echo "Harsha is in the DevOps team"
          echo "hello, ${{ secrets.GOA_LO_BAMCHIK }}"

      - name: Print index.html file
        run: cat index.html

  stage:
    runs-on: ubuntu-latest
    needs: sit
    steps:
      - name: STAGE Deployment
        run: |
          echo "Deploying to STAGE environment"

  prod:
    runs-on: ubuntu-latest
    needs: stage
    steps:
      - name: TRAIN Deployment
        run: |
          echo "Deploying to TRAIN environment"

  train:
    runs-on: ubuntu-latest
    needs: prod
    steps:
      - name: PROD Deployment
        run: |
          echo "Deploying to PROD environment"
